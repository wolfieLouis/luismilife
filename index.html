<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="LuismiLife - Tu gestor de vida personal" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LuismiLife" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <title>LuismiLife</title>

  <!-- PWA: capturar evento ANTES de que todo cargue -->
  <script>
    window._pwaPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window._pwaPrompt = e;
      const btn = document.getElementById('install-btn');
      if (btn) btn.style.display = 'block';
    });
    window.addEventListener('appinstalled', () => {
      window._pwaPrompt = null;
      const btn = document.getElementById('install-btn');
      if (btn) btn.style.display = 'none';
    });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</head>
<body>

  <!-- ========== OVERLAY ========== -->
  <div class="overlay" id="overlay"></div>

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">LuismiLife</span>
      </div>
      <button class="sidebar-close" id="sidebarClose">
        <i class="fa fa-times"></i>
      </button>
    </div>

    <div class="sidebar-verse">
      <p id="verseText">"Todo lo puedo en Cristo que me fortalece."</p>
      <span id="verseRef">— Filipenses 4:13</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <i class="fa fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-page="spiritual">
        <i class="fa fa-cross"></i>
        <span>Espiritual</span>
      </a>
      <a href="#" class="nav-item" data-page="economic">
        <i class="fa fa-dollar-sign"></i>
        <span>Económica</span>
      </a>
      <a href="#" class="nav-item" data-page="academic">
        <i class="fa fa-book"></i>
        <span>Académica</span>
      </a>
      <a href="#" class="nav-item" data-page="fitness">
        <i class="fa fa-dumbbell"></i>
        <span>Fitness</span>
      </a>
      <a href="#" class="nav-item" data-page="notes">
        <i class="fa fa-sticky-note"></i>
        <span>Notas</span>
      </a>
      <a href="#" class="nav-item" data-page="goals">
        <i class="fa fa-bullseye"></i>
        <span>Metas</span>
      </a>
      <a href="#" class="nav-item" data-page="reminders">
        <i class="fa fa-bell"></i>
        <span>Recordatorios</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#" class="nav-item" data-page="settings">
        <i class="fa fa-cog"></i>
        <span>Ajustes</span>
      </a>

      <!-- Botón instalar PWA — aparece solo si es instalable -->
      <button id="install-btn" onclick="
        if(window._pwaPrompt){
          window._pwaPrompt.prompt();
          window._pwaPrompt.userChoice.then(()=>{
            window._pwaPrompt=null;
            document.getElementById('install-btn').style.display='none';
          });
        }
      " style="display:none;width:100%;margin-top:8px;padding:0.7rem 1rem;
        border:1.5px solid #7c3aed88;border-radius:10px;
        background:transparent;color:#a78bfa;font-size:0.85rem;
        cursor:pointer;font-weight:600;transition:all 0.2s;">
        📲 Instalar app
      </button>

    </div>

  </aside>

  <!-- ========== LAYOUT PRINCIPAL ========== -->
  <div class="main-wrapper">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">
        <i class="fa fa-bars"></i>
      </button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <div class="topbar-right">
        <span class="topbar-date" id="topbarDate"></span>
      </div>
    </header>

    <!-- CONTENIDO -->
    <main class="content" id="content">

      <div id="page-dashboard" class="page active">
        <p class="loading-text">Cargando...</p>
      </div>
      <div id="page-spiritual" class="page"></div>
      <div id="page-economic" class="page"></div>
      <div id="page-academic" class="page"></div>
      <div id="page-fitness" class="page"></div>
      <div id="page-notes" class="page"></div>
      <div id="page-goals" class="page"></div>
      <div id="page-reminders" class="page"></div>
      <div id="page-settings" class="page"></div>

    </main>

  </div>

  <!-- ========== MODAL GLOBAL ========== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Título</h2>
        <button class="modal-close" id="modalClose">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div class="toast" id="toast">
    <i class="fa fa-check-circle"></i>
    <span id="toastMsg">Guardado correctamente</span>
  </div>

  <!-- ========== SUPABASE ========== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ========== JS ========== -->
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/spiritual.js"></script>
  <script src="js/economic.js"></script>
  <script src="js/academic.js"></script>
  <script src="js/fitness.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/reminders.js"></script>

</body>
</html>
